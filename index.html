<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DuKit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
    }

    /* LEFT SIDE (branding / vibe) */
    .left {
      width: 45%;
      background: linear-gradient(160deg, #4fb3ff, #ffe066);
      color: #1a1a1a;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
    }

    .logo span {
      background: #fff;
      padding: 3px 10px;
      border-radius: 6px;
      margin-left: 5px;
    }

    .hero {
      font-size: 32px;
      font-weight: 600;
      max-width: 300px;
      line-height: 1.3;
    }

    .duck {
      font-size: 60px;
      margin-top: 20px;
    }

    /* RIGHT SIDE (form) */
    .right {
      width: 55%;
      background: #f9fafb;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-box {
      width: 320px;
    }

    h2 {
      margin-bottom: 20px;
      color: #111;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      background: white;
    }

    input:focus {
      border-color: #4fb3ff;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4fb3ff;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #379ee0;
    }

    .toggle {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
      cursor: pointer;
    }

    .toggle span {
      color: #4fb3ff;
      font-weight: 600;
    }

    /* MOBILE */
    @media(max-width: 800px) {
      .left {
        display: none;
      }
      .right {
        width: 100%;
      }
    }

  </style>
</head>
<body>

  <!-- LEFT -->
  <div class="left">
    <div class="logo">Du<span>Kit</span></div>

    <div>
      <div class="hero">
        Get A Little Quack In Your Life
      </div>
      <div class="duck">🦆</div>
    </div>

    <div style="font-size: 13px;">
      Jackson Academy
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="form-box">
      <h2 id="title">Login</h2>

      <input type="email" placeholder="Your Email">
      <!-- Username field only for Sign Up -->
      <input type="text" id="username" placeholder="Username" style="display:none;">

      <button onclick="submitForm()">Login</button>

      <div class="toggle" onclick="toggleMode()">
        New here? <span>Create account</span>
      </div>
    </div>
  </div>

  <script>
    let isLogin = true;

    function toggleMode() {
      const title = document.getElementById("title");
      const button = document.querySelector("button");
      const toggle = document.querySelector(".toggle");
      const usernameField = document.getElementById("username");

      if (isLogin) {
        title.innerText = "Sign Up";
        button.innerText = "Create Account";
        toggle.innerHTML = 'Already have an account? <span>Login</span>';
        usernameField.style.display = "block"; // show username
      } else {
        title.innerText = "Login";
        button.innerText = "Login";
        toggle.innerHTML = 'New here? <span>Create account</span>';
        usernameField.style.display = "none"; // hide username
      }

      isLogin = !isLogin;
    }

    function submitForm() {
      const email = document.querySelector('input[type="email"]').value;
      const username = document.getElementById("username").value;

      if(isLogin) {
        alert("Logging in with: " + email);
      } else {
        alert("Creating account:\nEmail: " + email + "\nUsername: " + username);
      }
    }
  </script>

</body>
</html>
